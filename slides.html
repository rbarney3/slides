<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kid Slides</title>

<style>
html, body {
  margin:0;
  font-family:sans-serif;
  overscroll-behavior:none;
}

/* TOP BAR */
#topbar {
  background:#4a6cff;
  padding:10px;
}

button {
  font-size:18px;
  margin:5px;
  padding:10px;
}

/* COLOR BUTTONS */
.colorBtn {
  width:30px;
  height:30px;
  display:inline-block;
  margin:5px;
  border-radius:50%;
  border:2px solid black;
  cursor:pointer;
}

/* EMOJI PICKER */
#emojiPicker {
  display:flex;
  flex-wrap:wrap;
  background:#fff;
  padding:10px;
}

.emojiBtn {
  font-size:36px;
  margin:5px;
  cursor:pointer;
}

/* SLIDES */
#slides {
  display:flex;
  background:#ddd;
  padding:5px;
}

.slideBtn {
  background:white;
  padding:10px;
  margin:5px;
  border:2px solid gray;
  cursor:pointer;
}

.active {
  border:3px solid blue;
}

/* STAGE */
#stage {
  width:100%;
  height:70vh;
  position:relative;
  background:white;
  touch-action:none;
}

canvas {
  position:absolute;
  top:0;
  left:0;
}

/* OBJECTS */
.obj {
  position:absolute;
  cursor:grab;
}

/* TEXT BOX (ZOOM SAFE) */
.textbox {
  font-size:18px;
  padding:8px;
  border:2px solid black;
  background:white;
  min-width:100px;
  transform:scale(1);
}
</style>
</head>

<body>

<div id="topbar">
  <button onclick="addSlide()">➕</button>
  <button onclick="addText()">🔤</button>
  <button onclick="tool='draw'">✏️</button>
  <button onclick="tool='erase'">🧽</button>
  <button onclick="clearSlide()">🧹</button>

  <!-- COLORS -->
  <div>
    <span class="colorBtn" style="background:black" onclick="setColor('black')"></span>
    <span class="colorBtn" style="background:red" onclick="setColor('red')"></span>
    <span class="colorBtn" style="background:blue" onclick="setColor('blue')"></span>
    <span class="colorBtn" style="background:green" onclick="setColor('green')"></span>
    <span class="colorBtn" style="background:orange" onclick="setColor('orange')"></span>
  </div>
</div>

<!-- EMOJIS -->
<div id="emojiPicker"></div>

<!-- SLIDES -->
<div id="slides"></div>

<!-- DRAW AREA -->
<div id="stage">
  <canvas id="c"></canvas>
</div>

<script>
// 🚫 BLOCK ALL ZOOM (Chromebook + iPad)

// Ctrl + scroll zoom
window.addEventListener("wheel", function(e){
  if(e.ctrlKey) e.preventDefault();
}, { passive:false });

// Pinch zoom
window.addEventListener("touchmove", function(e){
  if(e.scale !== 1) e.preventDefault();
}, { passive:false });

// Double tap zoom
let lastTouchEnd = 0;
document.addEventListener("touchend", function(e){
  let now = new Date().getTime();
  if(now - lastTouchEnd <= 300){
    e.preventDefault();
  }
  lastTouchEnd = now;
}, false);

// -------------------

let slides = [];
let current = 0;
let tool = "draw";
let color = "black";

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const stage = document.getElementById("stage");

// Resize canvas
function resize(){
  canvas.width = stage.clientWidth;
  canvas.height = stage.clientHeight;
}
resize();
window.addEventListener("resize", resize);

// DRAW
let drawing = false;

canvas.addEventListener("pointerdown", e=>{
  drawing = true;
  draw(e);
});
canvas.addEventListener("pointermove", draw);
canvas.addEventListener("pointerup", ()=>drawing=false);
canvas.addEventListener("pointerleave", ()=>drawing=false);

function draw(e){
  if(!drawing) return;

  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  ctx.fillStyle = tool==="erase" ? "white" : color;
  ctx.beginPath();
  ctx.arc(x,y, tool==="erase"?12:4, 0, Math.PI*2);
  ctx.fill();
}

function setColor(c){
  color = c;
  tool = "draw";
}

// TEXT
function addText(){
  const input = document.createElement("input");
  input.className = "obj textbox";
  input.placeholder = "type here";
  input.style.left = "100px";
  input.style.top = "100px";

  input.onpointerdown = startDrag;
  stage.appendChild(input);
}

// EMOJIS
const emojiList = ["🐶","🐱","🦁","🐸","🐵","🐼","🦊","🐷","🐰","🐨","🦄","🐙"];
const picker = document.getElementById("emojiPicker");

emojiList.forEach(e=>{
  const span = document.createElement("span");
  span.className = "emojiBtn";
  span.textContent = e;
  span.onclick = ()=>createEmoji(e);
  picker.appendChild(span);
});

function createEmoji(e){
  const d = document.createElement("div");
  d.className="obj";
  d.textContent=e;
  d.style.left="100px";
  d.style.top="100px";
  d.onpointerdown = startDrag;
  stage.appendChild(d);
}

// DRAG
function startDrag(e){
  const el = e.target;

  const offsetX = e.clientX - el.offsetLeft;
  const offsetY = e.clientY - el.offsetTop;

  function move(e){
    el.style.left = (e.clientX - offsetX) + "px";
    el.style.top = (e.clientY - offsetY) + "px";
  }

  function up(){
    window.removeEventListener("pointermove", move);
    window.removeEventListener("pointerup", up);
  }

  window.addEventListener("pointermove", move);
  window.addEventListener("pointerup", up);
}

// SLIDES
function addSlide(){
  slides.push({img:null, objs:[]});
  current = slides.length-1;
  renderSlides();
  loadSlide();
}

function renderSlides(){
  const container = document.getElementById("slides");
  container.innerHTML="";

  slides.forEach((_,i)=>{
    const btn = document.createElement("div");
    btn.className = "slideBtn"+(i===current?" active":"");
    btn.textContent = i+1;

    btn.onclick = ()=>{
      saveSlide();
      current = i;
      renderSlides();
      loadSlide();
    };

    container.appendChild(btn);
  });
}

function saveSlide(){
  slides[current].img = canvas.toDataURL();
  slides[current].objs = [];

  document.querySelectorAll(".obj").forEach(o=>{
    if(o.tagName === "INPUT"){
      slides[current].objs.push({
        type:"text",
        value:o.value,
        x:o.offsetLeft,
        y:o.offsetTop
      });
    } else {
      slides[current].objs.push({
        type:"emoji",
        value:o.textContent,
        x:o.offsetLeft,
        y:o.offsetTop
      });
    }
  });
}

function loadSlide(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  document.querySelectorAll(".obj").forEach(o=>o.remove());

  const s = slides[current];

  if(s.img){
    const img = new Image();
    img.src = s.img;
    img.onload = ()=> ctx.drawImage(img,0,0);
  }

  s.objs.forEach(o=>{
    if(o.type==="text"){
      const input = document.createElement("input");
      input.className="obj textbox";
      input.value=o.value;
      input.style.left=o.x+"px";
      input.style.top=o.y+"px";
      input.onpointerdown=startDrag;
      stage.appendChild(input);
    } else {
      const d=document.createElement("div");
      d.className="obj";
      d.textContent=o.value;
      d.style.left=o.x+"px";
      d.style.top=o.y+"px";
      d.onpointerdown=startDrag;
      stage.appendChild(d);
    }
  });
}

function clearSlide(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  document.querySelectorAll(".obj").forEach(o=>o.remove());
  slides[current]={img:null,objs:[]};
}

// START
addSlide();
</script>

</body>
</html>
